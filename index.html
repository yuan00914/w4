<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./static/reset.css" />
    <link rel="stylesheet" href="./static/base.css" />
    <link rel="stylesheet" href="./static/index.css" />
  </head>
  <body>
    <!-- 遮罩 -->
    <div class="mask"></div>

    <!-- header -->
    <header class="sticky-top z-index-1">
      <nav class="main-nav">
        <div class="container">
          <div class="col-12">
            <div class="d-flex flex-wrap align-items-center">
              <!-- 網站標誌（logo） -->
              <a class="logo" href="./index.html">
                <picture>
                  <source
                    srcset="
                      https://raw.githubusercontent.com/hexschool/2022-web-layout-training/456698ad0b642710162489555e98fd3b15eb49ff/2026-web-camp/device-mb.svg
                    "
                    media="(max-width: 992px)"
                  />
                  <img
                    src="https://raw.githubusercontent.com/hexschool/2022-web-layout-training/456698ad0b642710162489555e98fd3b15eb49ff/2026-web-camp/device-pc.svg"
                    alt=""
                  />
                </picture>
              </a>

              <!-- 行動版選單按鈕（漢堡按鈕） -->
              <button class="btn-menu ml-auto" type="button">
                <span class="material-symbols-outlined">dehaze</span>
              </button>

              <!-- 主導覽選單 -->
              <ul
                class="nav-list ml-auto d-flex gap-24 label-md-sm label-md gap-mb-12"
              >
                <li><a class="nav-link" href="#">服務項目</a></li>
                <li><a class="nav-link" href="#">專案作品</a></li>
                <li><a class="nav-link" href="#">部落格</a></li>
                <li><a class="nav-link" href="#">與我聯絡</a></li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <!-- hero -->
    <section class="hero px-mb-12 pb-mb-24 bg-primary-50">
      <div class="container h-full">
        <div class="d-flex align-items-center h-full relative flex-mb-col">
          <div class="col-5 text-neutral-700 order-mb-2 m-auto">
            <!-- 主要標題 -->
            <h1 class="heading-xxxl heading-mb-xl mb-24 mb-mb-12">
              <span class="d-block">Hello</span>
              <span class="d-block">I’m Nelson</span>
            </h1>

            <!-- 內文 -->
            <p class="paragraph-md paragraph-mb-sm mb-4">
              我是一個擁有 10 年經驗的 UIUX 設計師 和 前端工程師
            </p>
            <p class="paragraph-md paragraph-mb-sm mb-60 mb-mb-32">
              喜歡把美學和程式結合，打造一個又一個精美的網頁設計！
            </p>

            <!-- 按鈕群組 -->
            <div class="label-md label-mb-sm d-flex gap-24 gap-mb-12">
              <button class="btn bg-neutral-700 text-neutral-0" type="button">
                與我聯絡
              </button>
              <button class="btn resume" type="button">我的履歷</button>
            </div>
          </div>

          <div class="col-7 h-full relative ml-auto order-mb-1 m-auto">
            <img
              class="main-pic object-fit-cover mb-mb-24"
              src="https://github.com/hexschool/2022-web-layout-training/blob/main/2026-web-camp/index_person.png?raw=true"
              alt=""
            />

            <!-- 裝飾圖片 -->
            <img
              class="decorate-1"
              src="https://github.com/hexschool/2022-web-layout-training/blob/main/2026-web-camp/index_decora_1.png?raw=true"
              alt="decorate-1"
            />
            <img
              class="decorate-2"
              src="https://github.com/hexschool/2022-web-layout-training/blob/main/2026-web-camp/index_decora_2.png?raw=true"
              alt="decorate-2"
            />
          </div>

          <!-- 左下方小花 -->
          <img
            class="decorate-3 w-80 h-80 flower-left-bottom"
            src="https://github.com/hexschool/2022-web-layout-training/blob/main/2026-web-camp/index_decora_3.png?raw=true"
            alt=""
          />
          <!-- 左下方小花旁的線條 -->
          <img
            class="decorate-5"
            src="https://github.com/hexschool/2022-web-layout-training/blob/main/2026-web-camp/index_decora_5.png?raw=true"
            alt="decorate-5"
          />

          <!-- 左上方小花旁的線條 -->
          <img
            class="decorate-4"
            src="https://github.com/hexschool/2022-web-layout-training/blob/main/2026-web-camp/index_decora_4.png?raw=true"
            alt=""
          />

          <!-- 左上方小花 -->
          <img
            class="decorate-3 flower-left-top"
            src="https://github.com/hexschool/2022-web-layout-training/blob/main/2026-web-camp/index_decora_3.png?raw=true"
            alt=""
          />

          <!-- 右上方小花 -->
          <img
            class="decorate-3 flower-right-center"
            src="https://github.com/hexschool/2022-web-layout-training/blob/main/2026-web-camp/index_decora_3.png?raw=true"
            alt=""
          />
        </div>
      </div>
    </section>

    <!-- Services -->

    <!-- footer -->
    <footer class="bg-primary-900 py-80 py-mb-40">
      <div class="container">
        <div class="d-flex flex-mb-col gap-24 text-neutral-0">
          <div class="col-5 col-mb-12">
            <h2 class="mb-24 mb-mb-12">
              <span class="d-block heading-xxxs heading-mb-xxxxs"
                >與我聯絡</span
              >
              <span class="d-block heading-xxxl heading-mb-xl">CONTACT</span>
            </h2>

            <p class="paragraph-md paragraph-mb-sm mb-92 mb-mb-24">
              <span class="d-block mb-4 mb-mb-0"
                >若有數位產品設計和開發相關問題</span
              >
              <span class="d-block">歡迎填寫表單 或 直接與我聯絡！</span>
            </p>

            <!-- social icon -->
            <div
              class="d-flex line-height-1 gap-12 text-24 text-mb-20 mb-24 mb-mb-12 d-mb-none"
            >
              <i class="bi bi-instagram p-12 btn-outline rounded-circle"></i>
              <i class="bi bi-line p-12 btn-outline rounded-circle"></i>
              <i class="bi bi-linkedin p-12 btn-outline rounded-circle"></i>
            </div>

            <!-- 信箱資訊 -->
            <div class="d-flex d-mb-none gap-8">
              <span class="material-symbols-outlined text-24"> drafts </span>
              <p class="paragraph-md">service@hexschool.com</p>
            </div>
          </div>

          <div class="col-7 col-mb-12">
            <form
              class="paragraph-md paragraph-mb-sm text-neutral-0 d-flex flex-wrap px-40 px-mb-12 gap-24 gap-mb-12"
            >
              <input
                class="py-20 py-mb-16 pl-32 pl-mb-20 btn-outline rounded-40 rounded-mb-32 focus-outline-0 bg-transparent contact-input-half w-mb-full"
                type="text"
                placeholder="姓名"
              />
              <input
                class="py-20 py-mb-16 pl-32 pl-mb-20 btn-outline rounded-40 rounded-mb-32 focus-outline-0 bg-transparent contact-input-half"
                type="tel"
                placeholder="手機號碼"
              />
              <input
                class="py-20 py-mb-16 pl-32 pl-mb-20 btn-outline rounded-40 rounded-mb-32 focus-outline-0 bg-transparent w-full"
                type="email"
                placeholder="電子信箱"
              />
              <textarea
                placeholder="備註"
                rows="4"
                class="py-20 py-mb-16 pl-32 pl-mb-20 btn-outline rounded-40 rounded-mb-32 focus-outline-0 bg-transparent w-full"
              ></textarea>
              <button
                type="button"
                class="btn-reset bg-neutral-0 text-neutral-700 py-12 w-full rounded-full"
              >
                送出
              </button>
            </form>
          </div>

          <!-- 手機版使用 -->
          <div class="col-mb-12 d-none d-mb-block">
            <!-- social icon -->
            <div
              class="d-flex line-height-1 text-24 text-mb-20 mb-24 mb-mb-12 gap-12"
            >
              <i class="bi bi-instagram p-12 p- btn-outline rounded-circle"></i>
              <i class="bi bi-line p-12 btn-outline rounded-circle"></i>
              <i class="bi bi-linkedin p-12 btn-outline rounded-circle"></i>
            </div>

            <!-- 信箱資訊 -->
            <div class="d-flex gap-8">
              <span class="material-symbols-outlined text-24 text-mb-20">
                drafts
              </span>
              <p class="paragraph-md paragraph-md-sm">service@hexschool.com</p>
            </div>
          </div>
        </div>
      </div>
    </footer>
    <script src="./index.js"></script>
  </body>
</html>
